run_context:
  note: Example results file for scripts/eval/run_model_harness.py

runs:
  - lane_id: domain_assistant_small
    model: Qwen2.5-1.5B-Instruct
    metrics:
      grounded_answer_rate: 0.91
      hallucination_rate: 0.07
      sme_score: 3.9
      p50_ttft_seconds: 2.3
      decode_tokens_per_second: 8.6

  - lane_id: dense_retrieval
    model: e5-large-v2
    metrics:
      ndcg_at_10: 0.82
      recall_at_20: 0.91
      embedding_docs_per_second: 128.0

  - lane_id: summarization
    model: FLAN-T5-large
    metrics:
      rouge_l: 0.41
      factual_consistency: 0.88
      seconds_per_sample_1k_input: 11.2
